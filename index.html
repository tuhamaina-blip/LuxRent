<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1,0">
    <title>LuxRent  Enterprise Real Estate & Lead Architecture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
     <!-- HEADER AND NAVIGATION -->
    <header class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="#">
                    <i class="fa-solid fa-gem gold-icon"></i>
                    <span class="logo-text">LuxRent</span>
                </a>
            </div>

            <nav class="nav-links">
                <a href="#home" data-link="active">Home</a>
                <a href="#services">Services</a>
                <a href="#portfolio">Portfolio</a>
                <a href="#specs">Specs</a>
                <a href="#contact">Contact</a>
            </nav>

            <div class="nav-cta">
                <a href="#contact" class="nav-btn">Client Portal</a>
            </div>
        </div>
    </header>
    <main>
        <!-- HERO SECTION -->
         <section id="home" class="hero-viewport">
            <div class="hero-overlay">
                <div class="hero-card" data-state="premium">
                    <div class="card-inner">
                        <span class="top-label">Establishment 2024</span>
                        <h1 class="display-title">Lead Architecture <br>& Secure Assets</h1>
                        <p class="hero-description">
                            Nairobi's premier firm for high-performance real estate infrastructure. 
                            We build with the precision of code and the strength of stone.
                        </p>
                        <div class="cta-wrapper">
                            <a href="#contact" class="cta-btn primary">Start Consultation</a>
                            <a href="#portfolio" class="cta-btn secondary">View Projects</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

</html>
